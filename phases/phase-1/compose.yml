services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ektisis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gitea}
      POSTGRES_USER: ${POSTGRES_USER:-gitea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${EKTISIS_RUNTIME_DIR:?EKTISIS_RUNTIME_DIR is required}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gitea} -d ${POSTGRES_DB:-gitea}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ektisis

  gitea:
    image: ${GITEA_IMAGE:-gitea/gitea:latest}
    container_name: ektisis-gitea
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USER_UID: ${GITEA_USER_UID:-1000}
      USER_GID: ${GITEA_USER_GID:-1000}
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: ${POSTGRES_DB:-gitea}
      GITEA__database__USER: ${POSTGRES_USER:-gitea}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-localhost}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://localhost:3000/}
      GITEA__server__SSH_DOMAIN: ${GITEA_SSH_DOMAIN:-localhost}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__server__SSH_LISTEN_PORT: 2222
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__actions__ENABLED: "true"
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:2222"
    volumes:
      - ${EKTISIS_RUNTIME_DIR:?EKTISIS_RUNTIME_DIR is required}/data/gitea:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - ektisis

  freellmapi:
    image: ghcr.io/tashfeenahmed/freellmapi:latest
    container_name: ektisis-freellmapi
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      ENCRYPTION_KEY: ${FREELLMAPI_ENCRYPTION_KEY:?FREELLMAPI_ENCRYPTION_KEY is required}
      REQUEST_ANALYTICS_RETENTION_DAYS: ${FREELLMAPI_REQUEST_ANALYTICS_RETENTION_DAYS:-90}
      REQUEST_ANALYTICS_MAX_ROWS: ${FREELLMAPI_REQUEST_ANALYTICS_MAX_ROWS:-100000}
    ports:
      - "${FREELLMAPI_PORT:-3001}:3001"
    volumes:
      - ${EKTISIS_RUNTIME_DIR:?EKTISIS_RUNTIME_DIR is required}/data/freellmapi:/app/server/data
    networks:
      - ektisis

  litellm:
    image: ${LITELLM_IMAGE:-docker.litellm.ai/berriai/litellm:main-latest}
    container_name: ektisis-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      freellmapi:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gitea}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${LITELLM_DB:-litellm}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?LITELLM_SALT_KEY is required}
      STORE_MODEL_IN_DB: "True"
      FREE_LLM_API_BASE: http://freellmapi:3001/v1
      FREE_LLM_API_KEY: ${FREE_LLM_API_KEY:-sk-placeholder}
    command:
      - --config=/app/config.yaml
      - --port=4000
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ${EKTISIS_RUNTIME_DIR:?EKTISIS_RUNTIME_DIR is required}/compose/phase-1/litellm-config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=5)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - ektisis

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ektisis-redis
    restart: unless-stopped
    volumes:
      - ${EKTISIS_RUNTIME_DIR:?EKTISIS_RUNTIME_DIR is required}/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ektisis

  openhands:
    image: ${OPENHANDS_IMAGE:-docker.all-hands.dev/all-hands-ai/openhands:latest}
    container_name: ektisis-openhands
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_started
      gitea:
        condition: service_healthy
    environment:
      LLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required}
      LLM_BASE_URL: http://litellm:4000
      LLM_MODEL: ${OPENHANDS_LLM_MODEL:-ektisis-free}
      SANDBOX_RUNTIME_CONTAINER_IMAGE: ${OPENHANDS_SANDBOX_IMAGE:-docker.all-hands.dev/all-hands-ai/runtime:latest}
      LOG_ALL_EVENTS: "true"
    ports:
      - "${OPENHANDS_PORT:-3002}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${EKTISIS_RUNTIME_DIR:?EKTISIS_RUNTIME_DIR is required}/data/openhands:/.openhands-state
      - ${EKTISIS_RUNTIME_DIR:?EKTISIS_RUNTIME_DIR is required}/projects:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ektisis

networks:
  ektisis:
    name: ektisis-phase-1a
